<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Under Construction</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .popup {
      width: 100%;
      max-width: 380px;
      background: #fff;
      padding: 32px 24px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
    }

    .popup h1 {
      font-size: 1.7rem;
      color: #222;
      margin-bottom: 12px;
    }

    .popup p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .btn {
      display: inline-block;
      background: #ffcf95;
      color: #222;
      text-decoration: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <div class="popup">
    <h1>Site Under Construction</h1>
    <p>
      This section is currently being built and will be available soon.
      Meanwhile, you can explore our other manuals.
    </p>

    <a href="/index.html" class="btn">
      Visit Other Manuals
    </a>
  </div>
</body>
</html>
